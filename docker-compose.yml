services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: magna-api:dev
    container_name: magna-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/var/app.db
      AUTO_SEED: "1"
    volumes:
      - sqlite-data:/app/var
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - magna-net

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://api:8000
    image: magna-web:dev
    container_name: magna-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - magna-net

volumes:
  sqlite-data:
    name: magna-sqlite-data

networks:
  magna-net:
    driver: bridge
